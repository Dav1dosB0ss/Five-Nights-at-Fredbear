<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Five Nights At Fredbear's</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --ui-gold: #ffcc00;
            --ui-red: #cc0000;
            --ui-cyan: #00e5ff;
            --map-bg: #071521;
            --map-line: #1cb7c8;
            --map-glow: #ffd45a;
        }

        * { 
            box-sizing: border-box; 
        }

        body, html {
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100dvh; /* Строго динамическая высота */
            overflow: hidden;
            background: black;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            color: white;
            touch-action: none;
        }

        .fnaf-font { 
            font-family: 'Press Start 2P', cursive; 
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu {
            position: absolute; 
            inset: 0; 
            z-index: 5000;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            overflow: hidden;
        }

        .menu-noise { 
            position: absolute; 
            inset: 0; 
            opacity: 0.15; 
            z-index: 1; 
            pointer-events: none; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }

        .menu-scanlines { 
            position: absolute; 
            inset: 0; 
            z-index: 2; 
            pointer-events: none; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); 
            background-size: 100% 6px; 
        }
        
        .menu-content { 
            position: relative; 
            z-index: 10; 
            padding-left: 10vw; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100%; 
        }

        .menu-title { 
            font-size: 3vw; 
            line-height: 1.5; 
            text-shadow: 0 0 15px rgba(255,255,255,0.3); 
            margin-bottom: 10vh; 
            max-width: 50vw; 
        }

        .menu-btn { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 1.5vw; 
            color: white; 
            background: none; 
            border: none; 
            text-align: left; 
            cursor: pointer; 
            margin-bottom: 20px; 
            transition: color 0.2s, text-shadow 0.2s; 
        }

        .menu-btn:hover:not(:disabled) { 
            color: var(--ui-gold); 
            text-shadow: 0 0 10px var(--ui-gold); 
        }

        .menu-btn:disabled { 
            color: #444; 
            cursor: not-allowed; 
        }

        /* Кнопка переключения языка */
        #lang-toggle {
            position: absolute;
            top: 2vw;
            right: 3vw;
            z-index: 50;
            font-size: 2vw;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #lang-toggle:hover {
            color: var(--ui-gold);
            text-shadow: 0 0 15px var(--ui-gold);
        }
        
        .menu-animatronics { 
            position: absolute; 
            right: -5vw; 
            top: 10vh; 
            z-index: 5; 
            display: flex; 
            opacity: 0.6; 
            filter: drop-shadow(0 0 50px black); 
            transform: scale(1.2); 
        }

        .menu-animatronics svg { 
            width: 40vw; 
            height: auto; 
            max-width: 500px; 
        }

        /* --- ЭКРАН НОЧИ --- */
        #night-screen {
            position: absolute; 
            inset: 0; 
            z-index: 4500;
            background: black; 
            display: none; 
            justify-content: center; 
            align-items: center;
            flex-direction: column;
        }

        #night-screen-text { 
            font-size: 3vw; 
            color: white; 
            text-shadow: 2px 2px 0 #555; 
        }

        /* --- КОНТЕЙНЕР ИГРЫ --- */
        #game-container {
            position: fixed; /* Было relative. Fixed спасет от вылезания за экран */
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); 
            overflow: hidden; 
            display: none;
        }

        /* --- ПАНОРАМНЫЙ ОФИС --- */
        #office-viewport { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            height: 100dvh;
            overflow: hidden; 
        }

        #office-panorama {
            position: absolute; 
            width: 160vw; 
            height: 100vh; 
            height: 100dvh;
            left: 0; 
            top: 0;
            background: 
                radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.65) 100%),
                linear-gradient(180deg, #35204a 0%, #2b193a 38%, #8b2639 39%, #8b2639 48%, #2a5565 49%, #153742 100%),
                repeating-linear-gradient(90deg, rgba(255,204,0,0.18), rgba(255,204,0,0.18) 60px, rgba(123,36,48,0.18) 60px, rgba(123,36,48,0.18) 120px);
            display: flex; 
            align-items: center; 
            box-shadow: inset 0 0 100px black;
            will-change: transform; 
            transition: transform 0.1s linear, filter 1s ease-in-out;
        }

        .wall-decor {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background-image: 
                linear-gradient(45deg, transparent 48%, rgba(255,214,97,0.45) 49%, rgba(255,214,97,0.45) 51%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(255,122,79,0.28) 49%, rgba(255,122,79,0.28) 51%, transparent 52%);
            background-size: 250px 250px; 
            opacity: 0.22; 
            pointer-events: none;
        }
        
        .poster {
            position: absolute; 
            width: 10vw; 
            height: 15vw;
            background: linear-gradient(160deg, #f4c24f, #8c2e45); 
            border: 5px solid #2a1709;
            box-shadow: 0 0 15px black; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold; 
            color: #210b16; 
            text-align: center;
        }

        /* Коридор */
        #hallway {
            position: absolute; 
            left: 60vw; 
            top: 10vh; 
            width: 40vw; 
            height: 60vh;
            background: 
                radial-gradient(ellipse at center, rgba(255,215,124,0.15), transparent 55%), 
                repeating-linear-gradient(90deg, #153443, #153443 20px, #0b1b27 20px, #0b1b27 40px);
            border: 12px solid #5c3822; 
            box-shadow: inset 0 0 100px #05060a, 0 0 50px rgba(0,0,0,0.9);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 5px;
        }

        #hallway-light-fx { 
            position: absolute; 
            inset: 0; 
            background: radial-gradient(ellipse at center, rgba(255,255,230,0.25) 0%, transparent 80%); 
            opacity: 0; 
            pointer-events: none; 
            z-index: 2; 
            transition: opacity 0.1s; 
        }

        /* Вентиляции */
        .vent-container {
            position: absolute; 
            bottom: 25vh; 
            width: 18vw; 
            height: 45vh;
            background: linear-gradient(180deg, #143547, #061018); 
            border: 15px solid #6b4a24;
            border-bottom: none; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end;
            box-shadow: inset 0 30px 60px black, 0 0 50px black; 
            z-index: 5;
        }

        #vent-l { left: 8vw; } 
        #vent-r { right: 8vw; }

        .vent-light { 
            position: absolute; 
            inset: 0; 
            background: radial-gradient(circle at bottom, rgba(255,255,240,0.3) 0%, transparent 90%); 
            opacity: 0; 
            transition: opacity 0.05s; 
            pointer-events: none; 
            z-index: 2; 
        }

        .vent-door { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            height: 0; 
            background: repeating-linear-gradient(0deg, #8f6a32, #8f6a32 15px, #3b2116 15px, #3b2116 30px); 
            border-bottom: 20px solid #1a0e08; 
            transition: height 0.3s cubic-bezier(0.5, 0, 0.2, 1); 
            z-index: 10; 
            box-shadow: 0 15px 30px black; 
        }

        /* Панели кнопок */
        .control-panel {
            position: absolute; 
            top: 35vh; 
            width: 6vw; 
            height: 18vh;
            background: linear-gradient(135deg, #4a3420, #182c3a); 
            border: 5px solid #7a552b; 
            border-radius: 8px;
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            align-items: center;
            box-shadow: 10px 10px 30px black, inset 0 0 15px #000;
        }

        #panel-l { left: 30vw; } 
        #panel-r { right: 30vw; }

        .btn {
            width: 4vw; 
            height: 4vw; 
            max-width: 55px; 
            max-height: 55px;
            border-radius: 50%; 
            cursor: pointer; 
            border: 4px solid #333;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: 0.1s;
            box-shadow: 0 8px 15px black; 
            touch-action: manipulation;
        }
        
        .btn-color-light { 
            background: #dedede; 
            border-color: #999; 
        }

        .btn-color-door { 
            background: #9c0000; 
            border-color: #550000; 
        }
        
        .btn-active-light { 
            background: #fff !important; 
            box-shadow: 0 0 30px #fff, inset 0 0 10px #000; 
            border-color: #fff !important; 
        }

        .btn-active-door { 
            background: #ff0000 !important; 
            box-shadow: 0 0 30px #f00, inset 0 0 10px #400; 
            border-color: #ff6666 !important; 
        }

        /* СТОЛ */
        #desk { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 32vh; 
            background: linear-gradient(180deg, #83542d 0%, #3d2418 100%); 
            border-top: 15px solid #5b351f; 
            box-shadow: 0 -30px 100px rgba(0,0,0,0.95); 
            z-index: 20; 
            display: flex; 
            justify-content: center; 
        }

        .monitor { 
            position: absolute; 
            top: -12vh; 
            left: 45vw; 
            width: 15vw; 
            height: 18vh; 
            background: #06121b; 
            border: 10px solid #724726; 
            border-radius: 5px; 
            box-shadow: 0 0 40px black; 
        }

        .monitor2 { 
            position: absolute; 
            top: -10vh; 
            right: 45vw; 
            width: 12vw; 
            height: 16vh; 
            background: #11283a; 
            border: 8px solid #5d3921; 
            border-radius: 5px; 
            box-shadow: 0 0 30px black; 
            transform: rotate(-5deg); 
        }

        .cup { 
            position: absolute; 
            top: -6vh; 
            left: 35vw; 
            width: 4vw; 
            height: 9vh; 
            background: linear-gradient(90deg, #f4f1d0, #d13d3d); 
            border-radius: 5px; 
            box-shadow: inset -10px 0 15px rgba(0,0,0,0.35); 
        }

        #retro-player { 
            position: absolute; 
            top: -8vh; 
            left: 62vw; 
            width: 16vw; 
            min-width: 210px; 
            height: 9vh; 
            min-height: 72px; 
            background: linear-gradient(180deg, #9b8a62 0%, #4a3d25 100%); 
            border: 5px solid #1b160e; 
            border-radius: 6px; 
            box-shadow: 0 14px 28px black, inset 0 0 18px rgba(255,220,120,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            padding: 8px; 
            transform: rotate(2deg); 
        }

        .retro-reel { 
            width: 3.3vw; 
            height: 3.3vw; 
            min-width: 34px; 
            min-height: 34px; 
            border-radius: 50%; 
            background: radial-gradient(circle, #111 0 18%, #c7b47c 19% 32%, #1a140b 33% 36%, #c7b47c 37% 100%); 
            border: 3px solid #1b160e; 
            box-shadow: inset 0 0 12px black; 
        }

        .audio-controls { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            justify-content: center; 
        }

        .audio-control-btn { 
            position: relative; 
            width: 3vw; 
            height: 3vw; 
            min-width: 42px; 
            min-height: 42px; 
            border-radius: 50%; 
            border: 4px solid #360000; 
            background: radial-gradient(circle at 35% 30%, #ff6666 0%, #c40000 45%, #4b0000 100%); 
            box-shadow: 0 0 14px rgba(255,0,0,0.35), inset 0 -8px 10px rgba(0,0,0,0.55); 
            cursor: pointer; 
        }

        .audio-control-btn::before, .audio-control-btn::after { 
            content: ''; 
            position: absolute; 
            display: block; 
        }

        #audio-load-btn::before { 
            left: 38%; 
            top: 29%; 
            border-left: 14px solid #fff4cf; 
            border-top: 9px solid transparent; 
            border-bottom: 9px solid transparent; 
            filter: drop-shadow(0 0 4px #2b0000); 
        }

        #audio-pause-btn::before, #audio-pause-btn::after { 
            top: 28%; 
            width: 6px; 
            height: 18px; 
            background: #fff4cf; 
            border-radius: 2px; 
            filter: drop-shadow(0 0 4px #2b0000); 
        }

        #audio-pause-btn::before { left: 33%; } 
        #audio-pause-btn::after { right: 33%; }

        .audio-control-btn.playing { 
            box-shadow: 0 0 24px rgba(255,0,0,0.7), inset 0 -8px 10px rgba(0,0,0,0.55); 
        }
        
        #audio-file-input { display: none; }
        
        #fan { 
            position: absolute; 
            top: -20vh; 
            right: 35vw; 
            width: 12vw; 
            height: 22vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .fan-base { 
            width: 5vw; 
            height: 3vh; 
            background: #5e422f; 
            border-radius: 5px; 
            margin-top: auto; 
            box-shadow: 0 5px 10px black; 
        }

        .fan-stand { 
            width: 1.5vw; 
            height: 8vh; 
            background: #7b5a3c; 
        }

        .fan-head { 
            width: 12vw; 
            height: 12vw; 
            background: rgba(27,50,65,0.75); 
            border-radius: 50%; 
            border: 5px solid #91643c; 
            position: absolute; 
            top: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 0 30px black; 
        }

        .fan-blades { 
            width: 90%; 
            height: 90%; 
            background: conic-gradient(from 0deg, transparent 0deg 30deg, #d7b36a 30deg 90deg, transparent 90deg 150deg, #d7b36a 150deg 210deg, transparent 210deg 270deg, #d7b36a 270deg 330deg, transparent 330deg 360deg); 
            border-radius: 50%; 
            animation: spin 0.2s linear infinite; 
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* --- КНОПКИ ИНТЕРФЕЙСА --- */
        /* --- КНОПКИ ИНТЕРФЕЙСА --- */
        .ui-pull-btn {
            position: fixed; /* Было absolute */
            bottom: env(safe-area-inset-bottom, 2px); /* Защита от нижних полосок навигации Android/iOS */
            height: 40px; 
            width: 25vw;
            background: rgba(11,32,48,0.72); 
            border: 2px solid rgba(255,212,90,0.32);
            border-bottom: none; 
            z-index: 4000; /* Подняли z-index, чтобы они 100% были поверх всего */
            cursor: pointer; 
            transition: 0.2s;
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: rgba(255,255,255,0.6); 
            font-weight: bold; 
            letter-spacing: 2px; 
            text-shadow: 0 0 5px black;
        }

        .ui-pull-btn:hover { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            height: 55px; 
            border-color: rgba(255,255,255,0.5); 
            box-shadow: 0 0 25px rgba(255,255,255,0.2); 
        }

        #btn-mask-ui { 
            left: 5vw; 
            border-radius: 15px 15px 0 0; 
            border-left: 5px solid var(--ui-red); 
        }

        #btn-tablet-ui { 
            right: 5vw; 
            border-radius: 15px 15px 0 0; 
            border-right: 5px solid var(--ui-cyan); 
        }
        
        /* МОБИЛЬНАЯ КНОПКА ФОНАРИКА */
        #mobile-flash-btn {
            display: none;
            position: absolute; 
            bottom: 80px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 70px; 
            height: 70px; 
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.5); 
            border-radius: 50%;
            z-index: 350; 
            justify-content: center; 
            align-items: center;
            font-size: 30px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            user-select: none; 
            -webkit-user-select: none;
        }

        #mobile-flash-btn.active { 
            background: rgba(255,255,255,0.8); 
            box-shadow: 0 0 30px #fff; 
        }

        /* --- ПЛАНШЕТ --- */
        #tablet { 
            position: absolute; 
            bottom: -120%; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            height: 100dvh;
            background: #071521; 
            z-index: 300; 
            display: flex; 
            border-top: 8px solid #6b4a24; 
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        #tablet.active { 
            bottom: 0; 
        }

        #cam-view { 
            flex: 2.2; 
            position: relative; 
            border: 25px solid #5d3921; 
            background: #071521; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #map-view { 
            flex: 1.5; 
            background: var(--map-bg); 
            position: relative; 
            padding: 20px; 
            border-left: 4px solid #6b4a24; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: inset 0 0 100px rgba(0,40,70,0.9); 
            overflow-y: auto; 
        }

        .map-root { 
            position: relative; 
            width: 400px; 
            height: 500px; 
            margin-top: 10px; 
            transform: scale(0.9); 
            transform-origin: top center; 
        }

        .map-svg-lines { 
            position: absolute; 
            inset: 0; 
            z-index: 1; 
            pointer-events: none; 
        }

        .room { 
            position: absolute; 
            border: 2px solid var(--map-line); 
            background: rgba(9,62,86,0.85); 
            color: var(--map-glow); 
            font-size: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            pointer-events: none; 
            z-index: 5; 
            box-shadow: inset 0 0 15px rgba(0,255,255,0.1); 
        }

        .r-workshop { top: 20px; left: 20px; width: 70px; height: 70px; } 
        .r-parts { top: 100px; left: 20px; width: 70px; height: 80px; } 
        .r-kitchen { top: 20px; left: 100px; width: 90px; height: 80px; } 
        .r-halltop { top: 110px; left: 100px; width: 190px; height: 20px; border-bottom: none; } 
        .r-dining { top: 30px; left: 300px; width: 120px; height: 200px; } 
        .r-cove { top: 240px; left: 300px; width: 120px; height: 80px; } 
        .r-party1 { top: 150px; left: 50px; width: 60px; height: 60px; } 
        .r-party2 { top: 220px; left: 50px; width: 60px; height: 60px; } 
        .r-office { top: 430px; left: 80px; width: 120px; height: 50px; border-color: var(--ui-gold); color: var(--ui-gold); } 
        .r-ventL { top: 400px; left: 30px; width: 40px; height: 60px; } 
        .r-ventR { top: 400px; left: 210px; width: 40px; height: 60px; }

        .cam-node { 
            position: absolute; 
            width: 35px; 
            height: 18px; 
            background: #10283a; 
            border: 1px solid var(--ui-cyan); 
            color: var(--ui-cyan); 
            font-size: 9px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            z-index: 10; 
            transition: 0.1s; 
            box-shadow: 0 0 10px black; 
        }

        .cam-node.active { 
            background: var(--ui-gold); 
            color: black; 
            border-color: #fff; 
            font-weight: bold; 
            box-shadow: 0 0 15px var(--ui-gold); 
        }

        /* --- ЭФФЕКТЫ --- */
        .noise { 
            position: absolute; 
            inset: 0; 
            pointer-events: none; 
            opacity: 0.15; 
            z-index: 50; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }

        .scanlines { 
            position: absolute; 
            inset: 0; 
            pointer-events: none; 
            z-index: 51;

        }

            position: absolute; 
            inset: 0; 
            background: rgba(255,255,255,0.14); 
            animation: jumpscareFlash 0.11s steps(2) infinite;

        @keyframes jumpscareShake {

            50% { transform: translate(10px,-10px) rotate(1deg); } 
            75% { transform: translate(-8px,-6px) rotate(0.5deg); } 
            100% { transform: translate(12px,6px) rotate(-0.5deg); }

            0%, 100% { opacity: 0; }

        @keyframes springbonnieRightLunge {

    // --- СИСТЕМА ЗВУКА И СИНТЕЗА ---

    function getGameAudioContext() { 
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        } catch(e) {
            return null;
        } 
    }

    function playNote(freq, timeOffset) { 
        if (!audioCtx) return; 
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timeOffset);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime + timeOffset);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeOffset + 0.6);
        
        osc.start(audioCtx.currentTime + timeOffset);
        osc.stop(audioCtx.currentTime + timeOffset + 0.6); 
    }

    function playMusicBox() { 
        const ctx = getGameAudioContext();
        if (!ctx) return;
        
        isPlayingMusicBox = true;
        
        const notes = [349, 349, 349, 261, 440, 440, 440, 293, 466, 466, 466, 392, 349, 330, 349];
        
        function loop() {
            if (!isPlayingMusicBox) return;
            notes.forEach((freq, i) => playNote(freq, i * 0.5));
            setTimeout(loop, notes.length * 500);
        }
        
        loop(); 
    }

    function playTone(freq, duration, type, gainValue, startOffset = 0, endFreq = null) { 
        const ctx = getGameAudioContext();
        if (!ctx) return;
        
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = ctx.currentTime + startOffset;
        
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, start);
        
        if (endFreq) {
            osc.frequency.exponentialRampToValueAtTime(endFreq, start + duration);
        }
        
        gain.gain.setValueAtTime(gainValue, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
        
        osc.connect(gain); 
        gain.connect(ctx.destination);
        
        osc.start(start);
        osc.stop(start + duration); 
    }

    function playNoise(duration, gainValue, startOffset = 0) { 
        const ctx = getGameAudioContext();
        if (!ctx) return;
        
        const length = Math.max(1, Math.floor(ctx.sampleRate * duration));
        const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let i = 0; i < length; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        const start = ctx.currentTime + startOffset;
        
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(1200, start);
        filter.Q.setValueAtTime(0.9, start);
        
        gain.gain.setValueAtTime(gainValue, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
        
        src.buffer = buffer;
        src.connect(filter); 
        filter.connect(gain); 
        gain.connect(ctx.destination);
        
        src.start(start);
        src.stop(start + duration); 
    }

    function playSound(id) {
        if (id === 'cameraOpen') {

        if (id === 'cameraSwitch') { 
            playNoise(0.16, 0.055); 
            playTone(820, 0.04, 'square', 0.035);

            playNoise(0.035, 0.025);

        if (id === 'doorClose') {

    function setupRetroPlayer() {
        const playBtn = document.getElementById('audio-load-btn');
        const pauseBtn = document.getElementById('audio-pause-btn');
        const input = document.getElementById('audio-file-input');
        
        const setPlaying = val => { 
            playBtn.classList.toggle('playing', val); 
            pauseBtn.classList.toggle('playing', !val && !!nightAudio && !!nightAudio.src); 
        };
        
        const playCurrentAudio = () => { 
            if(!nightAudio || !nightAudio.src) return; 
            nightAudio.volume = 0.3; 
            nightAudio.play().then(() => setPlaying(true)).catch(() => setPlaying(false)); 
        };
        
        playBtn.addEventListener('click', () => { 
            if(nightAudio && nightAudio.src && nightAudio.paused) { 
                playCurrentAudio(); 
                return; 
            } 
            input.click(); 
        });
        
        pauseBtn.addEventListener('click', () => { 
            if(!nightAudio || !nightAudio.src) return; 
            nightAudio.pause(); 
            setPlaying(false); 
        });
        
        input.addEventListener('change', () => { 
            const f = input.files && input.files[0]; 
            if(!f) return; 
            if(nightAudioUrl) URL.revokeObjectURL(nightAudioUrl); 
            nightAudioUrl = URL.createObjectURL(f); 
            if(!nightAudio) nightAudio = new Audio(); 
            nightAudio.src = nightAudioUrl; 
            nightAudio.loop = true; 
            nightAudio.currentTime = 0; 
            playCurrentAudio(); 
        });
    }

    function renderScroll() {
        if (!state.tablet && !state.mask && !state.gameOver && !state.inBlackout) {
            if (mouseX < 0.5) panX += (0.5 - mouseX) * 2.4; 
            if (mouseX > 0.5) panX -= (mouseX - 0.5) * 2.4; 
            
            if (panX > MAX_PAN) panX = MAX_PAN; 
            if (panX < MIN_PAN) panX = MIN_PAN;
            
            document.getElementById('office-panorama').style.transform = `translateX(${panX}vw)`;
        }
        requestAnimationFrame(renderScroll);
    }

    function evaluateVentBlock() {
        const sb = state.enemies.sb;
        
        ['L', 'R'].forEach(side => {
            if (sb.pos === 'Vent' + side) {
                if (state['door' + side]) {
                    if (!sb.ventWaitTimer) {
                        let waitTime = Math.random() < 0.85 ? (2000 + Math.random() * 1500) : (4000 + Math.random() * 6000); 
                        sb.ventWaitTimer = setTimeout(() => {
                            sb.ventWaitTimer = null;
                            if (state['door' + side] && sb.pos === 'Vent' + side) {
                                sb.pos = 'Dining'; 
                                sb.currentPath = Math.random() > 0.5 ? sb.pathL : sb.pathR;
                                if (state.tablet) renderCam(); 
                                updateOffice();
                            }
                        }, waitTime);
                    }
                } else { 
                    if (sb.ventWaitTimer) { 
                        clearTimeout(sb.ventWaitTimer); 
                        sb.ventWaitTimer = null; 
                    } 
                }
            }
        });
    }

    function toggleDoor(side) {
        if(state.power <= 0 || state.gameOver) return;
        
        state['door'+side] = !state['door'+side];
        playSound(state['door'+side] ? 'doorClose' : 'doorOpen');
        
        document.getElementById('v-door-'+side.toLowerCase()).style.height = state['door'+side] ? '100%' : '0';
        document.getElementById('btn-door-'+side.toLowerCase()).classList.toggle('btn-active-door', state['door'+side]);
        
        updateUsage(); 
        updateOffice(); 
        evaluateVentBlock();
    }

    function setLight(side, val) {
        if(state.power <= 0 || state.gameOver) return;
        
        if(state['light'+side] !== val) playSound(val ? 'lightOn' : 'lightOff');
        state['light'+side] = val;
        
        document.getElementById('v-light-'+side.toLowerCase()).style.opacity = val ? 1 : 0;
        document.getElementById('btn-light-'+side.toLowerCase()).classList.toggle('btn-active-light', val);
        
        updateUsage(); 
        updateOffice();
    }

    function getSpringBonnieVentAttackSide() { 
        const sb = state.enemies.sb; 
        if(sb.pos === 'VentL' && !state.doorL) return 'L'; 
        if(sb.pos === 'VentR' && !state.doorR) return 'R'; 
        return null; 
    }

    function closeTabletForThreat() { 
        if(!state.tablet) return; 
        state.tablet = false; 
        document.getElementById('tablet').classList.remove('active'); 
        updateUsage(); 
        playSound('cameraClose'); 
    }

    function triggerSpringBonnieVentAttack(side) { 
        if(state.gameOver || state.inBlackout) return; 
        if(side === 'L' && (state.enemies.sb.pos !== 'VentL' || state.doorL)) return; 
        if(side === 'R' && (state.enemies.sb.pos !== 'VentR' || state.doorR)) return; 
        
        closeTabletForThreat(); 
        triggerJumpscare(side === 'L' ? 'sb_left' : 'sb_right'); 
    }

    function toggleTablet(val) {
        if(state.gameOver || state.inBlackout) return;
        
        const next = val === undefined ? !state.tablet : val;
        if(next && state.mask) return;
        
        const springAttackSide = next ? getSpringBonnieVentAttackSide() : null;
        state.tablet = next; 
        playSound(next ? 'cameraOpen' : 'cameraClose');
        document.getElementById('tablet').classList.toggle('active', next); 
        updateUsage();
        
        if(next) { 
            renderCam(); 
            if(springAttackSide) setTimeout(() => triggerSpringBonnieVentAttack(springAttackSide), 220); 
        }
    }

    function toggleMask(val) {
        if(state.gameOver || state.inBlackout) return;
        
        const next = val === undefined ? !state.mask : val;
        if(next && state.tablet) return;
        
        if(state.mask !== next) playSound('mask');
        state.mask = next; 
        document.getElementById('mask-overlay').style.display = next ? 'block' : 'none';
        updateUsage(); 
        updateOffice();
    }

    function switchCam(id, label, el) { 
        state.currentCam = id; 
        playSound('cameraSwitch'); 
        document.getElementById('cam-name').innerText = label + ": " + id.toUpperCase(); 
        
        document.querySelectorAll('.cam-node').forEach(n => n.classList.remove('active')); 
        el.classList.add('active'); 
        
        renderCam(); 
    }

    function renderCam() { 
        const bgLayer = document.getElementById('cam-bg-layer');
        const cont = document.getElementById('cam-content'); 
        
        bgLayer.innerHTML = CAM_BACKGROUNDS[state.currentCam] || CAM_BACKGROUNDS['Default']; 
        cont.innerHTML = ""; 
        
        for(let k in state.enemies) { 
            if(state.enemies[k].pos === state.currentCam) {
                cont.innerHTML += SVGS[k]; 
            }
        } 
    }

    function updateUsage() {
        let u = 1; 
        if(state.tablet) u++; 
        if(state.mask) u++; 
        if(state.lightL || state.lightR) u++; 
        if(state.doorL || state.doorR) u++; 
        if(state.flashlight) u++;
        state.usage = u; 
        
        const colors = ['#0f0', '#ff0', '#f90', '#f00', '#c00', '#900'];
        const display = document.getElementById('usage-val'); 
        
        display.innerText = i18n[currentLang].usage + ": " + ">".repeat(u); 
        display.style.color = colors[u-1] || '#900';
    }

    function nextNight() { 
        localStorage.setItem('fnaf_night', currentNight + 1); 
        location.reload(); 
    }

    function winNight() {
        if(state.gameOver) return;
        state.gameOver = true; 
        clearInterval(gameTickInterval); 
        
        blackoutTimeouts.forEach(clearTimeout);
        document.getElementById('blackout-event').style.display = 'none';

        document.getElementById('clock-ui').innerText = "6:00 AM";
        
        ambienceAudio.pause(); 
        isPlayingMusicBox = false; 
        if(audioCtx) audioCtx.suspend(); 
        if(nightAudio && !nightAudio.paused) nightAudio.pause();
        
        const vid = document.getElementById('video-6am'); 
        vid.style.display = 'block';
        
        vid.play().then(() => {
            vid.onended = nextNight;
        }).catch(e => { 
            alert(i18n[currentLang].survived); 
            nextNight(); 
        });
    }

    function tick() {
        if(state.gameOver) return;
        
        state.time++; 
        let hr = Math.floor(state.time / (NIGHT_SECONDS / 6));
        document.getElementById('clock-ui').innerText = (hr === 0 ? "12" : hr) + ":00 AM";
        
        if(hr === 6) { 
            winNight(); 
            return; 
        }

        if(state.inBlackout) return; 

        state.power -= (state.usage * 0.16);
        if(state.power <= 0) { 
            state.power = 0; 
            triggerBlackout(); 
        }
        document.getElementById('power-val').innerText = Math.floor(state.power);

        if(hr >= 1 || currentNight > 1) moveSB();
        if(hr >= (currentNight === 1 ? 2 : 1)) moveFB();
        
        checkAutomaticVentAttack(); 
        updateOffice();
    }

    function checkAutomaticVentAttack() {
        const sb = state.enemies.sb; 
        if (state.gameOver || state.inBlackout) return;
        
        if (sb.pos === 'VentL' && !state.doorL) { 
            sb.openVentTime += 1; 
            if (sb.openVentTime > 4) triggerJumpscare('sb_left'); 
        } else if (sb.pos === 'VentR' && !state.doorR) { 
            sb.openVentTime += 1; 
            if (sb.openVentTime > 4) triggerJumpscare('sb_right'); 
        } else {
            sb.openVentTime = 0;
        }
    }

    function moveSB() {
        const e = state.enemies.sb;
        const delay = Math.max(1500, 4500 - currentNight * 500);
        
        if(e.pos === 'VentL' || e.pos === 'VentR') return;
        
        if(Date.now() - e.lastMove > delay) {
            e.lastMove = Date.now();
            
            if(Math.random() * 20 < e.aggro) {
                if(e.pos === 'Dining' || e.pos === 'Kitchen') {
                    e.currentPath = Math.random() > 0.5 ? e.pathL : e.pathR;
                }
                const idx = e.currentPath.indexOf(e.pos);
                
                if(idx === -1) { 
                    e.pos = 'Dining'; 
                    e.currentPath = Math.random() > 0.5 ? e.pathL : e.pathR; 
                    return; 
                }
                
                if(idx < e.currentPath.length - 1) {
                    e.pos = e.currentPath[idx+1]; 
                    if(state.tablet) renderCam();
                    if(e.pos === 'VentL' || e.pos === 'VentR') evaluateVentBlock();
                }
            }
        }
    }

    function moveFB() {
        const e = state.enemies.fb;
        const delay = Math.max(3000, 8000 - currentNight * 600);
        
        if(e.pos === 'Front Hall') return;
        
        if(Date.now() - e.lastMove > delay) {
            e.lastMove = Date.now();
            
            if(Math.random() * 20 < e.aggro) {
                const idx = e.path.indexOf(e.pos);
                
                if(idx < e.path.length - 1) {
                    e.pos = e.path[idx+1];
                    if(e.pos === 'Front Hall') { 
                        e.seen = false; 
                        startFredbearFrontHallTimer(); 
                    }
                    if(state.tablet) renderCam();
                } else if(e.pos === 'Dining') {
                    e.pos = e.path[1];
                }
            }
        }
    }

    function updateOffice() {
        if(state.gameOver || state.inBlackout) return;
        
        const sb = state.enemies.sb;
        const fb = state.enemies.fb;
        const nodeL = document.getElementById('sb-vent-l');
        const nodeR = document.getElementById('sb-vent-r');
        
        if(sb.pos === 'VentL') { 
            if(state.doorL) {
                nodeL.style.display = 'none'; 
            } else { 
                nodeL.style.display = 'block'; 
                nodeL.style.opacity = state.lightL ? "1" : "0"; 
            } 
        } else {
            nodeL.style.display = 'none';
        }
        
        if(sb.pos === 'VentR') { 
            if(state.doorR) {
                nodeR.style.display = 'none'; 
            } else { 
                nodeR.style.display = 'block'; 
                nodeR.style.opacity = state.lightR ? "1" : "0"; 
            } 
        } else {
            nodeR.style.display = 'none';
        }
        
        const fbVisible = fb.pos === 'Front Hall' && state.flashlight; 
        if(fbVisible) fb.seen = true;
        
        document.getElementById('fb-hall').style.display = fbVisible ? 'block' : 'none';
        
        if(fb.pos === 'Front Hall' && !fb.frontHallTimer) startFredbearFrontHallTimer();
        if(state.mask && (fb.pos === 'Front Hall' || fb.pos === 'OFFICE')) startFredbearRetreat();
        
        if(fb.pos === 'OFFICE') { 
            if(state.mask) {
                startFredbearRetreat(); 
            } else {
                triggerJumpscare('fb'); 
            }
        }
    }

    function startFredbearFrontHallTimer() {
        const fb = state.enemies.fb; 
        if(fb.frontHallTimer) return;
        
        fb.frontHallTimer = setTimeout(() => {
            fb.frontHallTimer = null; 
            if(state.gameOver || state.inBlackout) return;
            
            if(fb.pos === 'Front Hall' && !state.mask) { 
                closeTabletForThreat(); 
                triggerJumpscare('fb'); 
            }
        }, 5000);
    }

    function startFredbearRetreat() {
        const fb = state.enemies.fb; 
        if(fb.retreatTimer) return;
        
        fb.retreatTimer = setTimeout(() => {
            fb.retreatTimer = null; 
            if(state.gameOver || state.inBlackout) return;
            
            if(state.mask && (fb.pos === 'Front Hall' || fb.pos === 'OFFICE')) {
                fb.pos = 'Dining'; 
                fb.seen = false; 
                fb.lastMove = Date.now();
                
                if(fb.frontHallTimer) { 
                    clearTimeout(fb.frontHallTimer); 
                    fb.frontHallTimer = null; 
                }
                
                document.getElementById('fb-hall').style.display = 'none'; 
                if(state.tablet) renderCam();
            }
        }, 3000 + Math.random() * 2000);
    }

    function triggerBlackout() {
        state.inBlackout = true; 
        playSound('blackout'); 
        
        state.tablet = false; 
        state.mask = false;
        
        document.getElementById('office-panorama').style.filter = "brightness(0.0)";
        document.getElementById('tablet').classList.remove('active'); 
        document.getElementById('mask-overlay').style.display = 'none';
        document.getElementById('v-door-l').style.height = '0'; 
        document.getElementById('v-door-r').style.height = '0';
        
        let t1 = setTimeout(() => {
            const b = document.getElementById('blackout-event'); 
            b.style.display = 'flex';
            
            try { playMusicBox(); } catch(e){}
            
            let t2 = setTimeout(() => {
                isPlayingMusicBox = false; 
                b.innerHTML = '';
                
                let t3 = setTimeout(() => {
                    triggerJumpscare('fb_blackout');
                }, 1000 + Math.random() * 1000);
                blackoutTimeouts.push(t3);
                
            }, 5000 + Math.random() * 7000);
            blackoutTimeouts.push(t2);
            
        }, 2000);
        blackoutTimeouts.push(t1);
    }

    function triggerJumpscare(id) {
        if(state.gameOver) return;
        state.gameOver = true; 
        clearInterval(gameTickInterval);
        
        state.tablet = false; 
        state.mask = false;
        
        document.getElementById('tablet').classList.remove('active'); 
        document.getElementById('mask-overlay').style.display = 'none'; 
        document.getElementById('blackout-event').style.display = 'none';
        
        ambienceAudio.pause();
        
        setTimeout(() => {
            const jump = document.getElementById('jumpscare'); 
            jump.className = 'animating'; 
            jump.style.transform = '';
            
            const isSB = id === 'sb' || id === 'sb_left' || id === 'sb_right';
            const isBlackout = id === 'fb_blackout';
            
            let spriteClass = 'jumpscare-fb';
            if (isSB) {
                spriteClass = 'jumpscare-sb ' + (id === 'sb_right' ? 'from-right' : 'from-left');
            }
            
            let spriteSvg = SVGS.fb;
            if (isSB) spriteSvg = SVGS.sb;
            if (isBlackout) spriteSvg = SVGS.fb_blackout;
            
            jump.innerHTML = `<div class="jumpscare-flash"></div><div class="jumpscare-sprite ${spriteClass}">${spriteSvg}</div>`;
            
            if (isSB) { 
                let s = new Audio('assets/Springbonnie.mp3'); 
                s.play().catch(() => playSound('jumpscare_synth')); 
            } else { 
                let f = new Audio('assets/Fredbear.mp3'); 
                f.play().catch(() => playSound('jumpscare_synth')); 
            }
            
            setTimeout(() => location.reload(), 2000);
        }, Math.random() * 400);
    }

    // Инициализация при загрузке страницы
    window.onload = initMenu;

</script>
